# 世界配置
world:
  name: "苍澜大陆"
  type: "cultivation"
  description: "一个仙魔并立的修真世界"

# 地点
locations:
  - id: "canglange"
    name: "苍澜阁"
    type: "sect"
    description: "正道领袖，门下弟子三千"
    
  - id: "qingming"
    name: "青冥宗"
    type: "sect"
    description: "正道大宗，以剑道闻名"
    
  - id: "zixu"
    name: "紫虚宫"
    type: "sect"
    description: "中立势力，精通丹药之术"
    
  - id: "chiyan"
    name: "炽焰谷"
    type: "sect"
    description: "邪道魁首，野心勃勃"
    
  - id: "sanjie"
    name: "三界战场"
    type: "neutral"
    description: "正邪交锋之地，机缘与危险并存"

# 交通：地点间的移动时间（天数），0=瞬移/传送阵
connections:
  - from: "canglange"
    to: "qingming"
    days: 1
  - from: "canglange"
    to: "zixu"
    days: 0  # 传送阵，瞬达
  - from: "qingming"
    to: "chiyan"
    days: 2
  - from: "chiyan"
    to: "sanjie"
    days: 1
  - from: "canglange"
    to: "sanjie"
    days: 2

# 角色（16个主角）
characters:
